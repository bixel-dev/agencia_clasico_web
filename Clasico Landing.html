<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Clasico. — Agencia creativa</title>

  <style>
    /* ===== tokens.css ===== */
    @import url("https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Archivo+Black&family=Inter:wght@400;500;600;700&display=swap");

    :root {
      --ink-900: #111111;
      --ink-700: #2A2A2A;
      --ink-500: #6B6B6B;
      --ink-300: #9A9A9A;
      --ink-200: #D9D9D9;
      --paper-100: #EFEFEF;
      --paper-50: #F5F5F5;
      --paper-0: #FFFFFF;
      --accent-orange: #F26522;
      --accent-orange-deep: #E05A1A;
      --accent-redorange: #FF5F03;
      --accent-green: #2EE000;
      --accent-acid: #CDE600;
      --accent-lavender: #8B82E3;
      --accent-coral: #E8704E;
      --bg-page: var(--paper-100);
      --bg-section: var(--paper-50);
      --bg-card: var(--paper-0);
      --bg-inverse: var(--ink-900);
      --fg-primary: var(--ink-900);
      --fg-secondary: var(--ink-500);
      --fg-muted: var(--ink-300);
      --fg-inverse: var(--paper-0);
      --border-subtle: var(--ink-200);
      --border-strong: var(--ink-900);
      --cta-primary: var(--accent-orange);
      --cta-primary-hover: var(--accent-orange-deep);
      --cta-secondary: var(--ink-900);
      --link: var(--ink-900);
      --link-hover: var(--ink-500);
      --font-display-serif: "DM Serif Display", "Bodoni Moda", "Playfair Display", Georgia, serif;
      --font-display-sans: "Archivo Black", "Inter", system-ui, sans-serif;
      --font-body: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", Roboto, "Helvetica Neue", Arial, sans-serif;
      --font-mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, monospace;
      --fs-display-xl: clamp(2.5rem, 7vw, 4.2rem);
      --fs-display-lg: clamp(2rem, 5vw, 3.6rem);
      --fs-display-md: clamp(1.5rem, 4vw, 3.2rem);
      --fs-display-sm: clamp(1.5rem, 3vw, 2rem);
      --fs-h3: 1.5rem;
      --fs-h4: 1.25rem;
      --fs-body-lg: 1.0625rem;
      --fs-body: 0.9375rem;
      --fs-body-sm: 0.875rem;
      --fs-label: 0.8125rem;
      --fs-micro: 0.75rem;
      --fs-mono-sm: 0.6875rem;
      --lh-display: 1.08;
      --lh-heading: 1.12;
      --lh-body: 1.6;
      --lh-prose: 1.65;
      --tracking-tight: -0.03em;
      --tracking-snug: -0.02em;
      --tracking-wide: 0.02em;
      --space-1: 4px; --space-2: 8px; --space-3: 12px; --space-4: 16px;
      --space-5: 20px; --space-6: 24px; --space-8: 32px; --space-10: 40px;
      --space-12: 48px; --space-16: 64px; --space-20: 80px;
      --radius-xs: 4px; --radius-sm: 8px; --radius-md: 12px;
      --radius-lg: 16px; --radius-xl: 20px; --radius-pill: 9999px;
      --shadow-soft: 0 2px 8px rgba(0,0,0,0.08);
      --shadow-soft-hover: 0 4px 16px rgba(0,0,0,0.12);
      --shadow-elevated: 0 12px 40px rgba(0,0,0,0.12);
      --ease-clasico: cubic-bezier(0.25, 0.1, 0.25, 1);
      --ease-sheet: cubic-bezier(0.32, 0.72, 0, 1);
      --duration-fast: 150ms; --duration-med: 300ms; --duration-long: 500ms;
      --container-max: 1440px;
      --container-px: 20px; --container-px-md: 32px; --container-px-lg: 48px;
    }

    /* ===== site.css ===== */
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg-page);
      color: var(--fg-primary);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow-x: hidden;
    }
    img { display: block; max-width: 100%; }
    a { color: inherit; text-decoration: none; }
    ::selection { background: var(--accent-orange); color: white; }

    .container {
      max-width: var(--container-max);
      margin: 0 auto;
      padding-left: var(--container-px);
      padding-right: var(--container-px);
    }
    @media (min-width: 768px) {
      .container { padding-left: var(--container-px-md); padding-right: var(--container-px-md); }
    }
    @media (min-width: 1024px) {
      .container { padding-left: var(--container-px-lg); padding-right: var(--container-px-lg); }
    }

    h1, h2, h3, h4 { margin: 0; }
    p { margin: 0; }

    .serif { font-family: var(--font-display-serif); font-weight: 400; letter-spacing: var(--tracking-tight); line-height: var(--lh-display); }
    .display-xl { font-family: var(--font-display-serif); font-size: var(--fs-display-xl); line-height: var(--lh-display); letter-spacing: var(--tracking-tight); font-weight: 400; }
    .display-lg { font-family: var(--font-display-serif); font-size: var(--fs-display-lg); line-height: var(--lh-heading); letter-spacing: var(--tracking-snug); font-weight: 400; }
    .display-md { font-family: var(--font-display-serif); font-size: var(--fs-display-md); line-height: var(--lh-heading); letter-spacing: var(--tracking-snug); font-weight: 400; }
    .display-sm { font-family: var(--font-display-serif); font-size: var(--fs-display-sm); line-height: var(--lh-heading); letter-spacing: var(--tracking-snug); font-weight: 400; }

    .eyebrow {
      font-family: var(--font-body);
      font-size: var(--fs-label);
      letter-spacing: var(--tracking-wide);
      color: var(--fg-primary);
      display: inline-flex;
      align-items: center;
      gap: 12px;
    }
    .eyebrow-num {
      width: 26px; height: 26px;
      border-radius: 999px;
      background: var(--bg-inverse);
      color: var(--fg-inverse);
      font-size: 12px; font-weight: 600;
      display: inline-flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .eyebrow-label {
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-pill);
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 500;
      background: var(--bg-card);
    }

    .prose-lg { font-size: clamp(1.05rem, 1.6vw, 1.4rem); line-height: 1.55; font-weight: 500; }
    .prose { font-size: var(--fs-body-lg); line-height: var(--lh-prose); font-weight: 500; color: var(--fg-primary); }
    .muted { color: var(--fg-secondary); }

    em, .em-serif {
      font-family: var(--font-display-serif);
      font-style: italic;
      font-weight: 400;
      letter-spacing: -0.01em;
    }

    .wm { display: inline-flex; align-items: baseline; line-height: 1; letter-spacing: -0.04em; }
    .wm-serif { font-family: var(--font-display-serif); font-weight: 400; }
    .wm-sans { font-family: var(--font-display-sans); text-transform: lowercase; letter-spacing: -0.06em; }
    .wm-bracket { font-family: var(--font-display-sans); margin-left: 0.04em; display: inline-block; transform: translateY(-0.04em); }

    /* nav */
    .nav-shell { position: fixed; top: 0; left: 0; right: 0; z-index: 60; pointer-events: none; }
    .nav-shell-inner { max-width: var(--container-max); margin: 0 auto; padding: 14px 20px; pointer-events: none; }
    @media (min-width: 1024px) { .nav-shell-inner { padding: 18px 48px; } }
    .nav-pill {
      pointer-events: auto;
      background: var(--accent-orange);
      color: var(--ink-900);
      border-radius: var(--radius-pill);
      padding: 6px 6px 6px 22px;
      display: flex; align-items: center; gap: 16px;
      box-shadow: var(--shadow-soft);
      transition: box-shadow var(--duration-long) var(--ease-clasico), background var(--duration-med) var(--ease-clasico);
    }
    .nav-pill .nav-link { color: var(--ink-900); }
    .nav-pill .nav-link:hover { color: rgba(0,0,0,0.55); }
    .nav-pill .nav-meta { color: rgba(0,0,0,0.7); }
    .nav-pill .nav-meta > span:first-child { background: var(--ink-900) !important; }
    .nav-pill .nav-burger { background: var(--ink-900); color: white; }
    .nav-pill.dark { background: #161616; color: white; }
    .nav-pill.dark .nav-link { color: #efefef; }
    .nav-pill.dark .nav-link:hover { color: #9a9a9a; }
    .nav-pill.dark .nav-meta { color: #9a9a9a; }
    .nav-pill:hover { box-shadow: var(--shadow-soft-hover); }
    .nav-links { display: none; align-items: center; gap: 28px; }
    @media (min-width: 900px) { .nav-links { display: flex; } }
    .nav-link { font-size: 14px; color: var(--fg-primary); transition: color var(--duration-med) var(--ease-clasico); }
    .nav-link:hover { color: var(--fg-secondary); }
    .nav-spacer { flex: 1; }
    .nav-meta { display: none; font-size: 13px; color: var(--fg-secondary); align-items: center; gap: 6px; }
    @media (min-width: 1180px) { .nav-meta { display: inline-flex; } }
    .nav-wordmark { margin-left: 16px; display: inline-flex; align-items: center; flex-shrink: 0; }
    .nav-wordmark img { height: 36px; width: auto; display: block; }
    .nav-burger {
      display: inline-flex; width: 40px; height: 40px;
      border-radius: 999px;
      background: var(--bg-inverse); color: var(--fg-inverse);
      align-items: center; justify-content: center;
      border: 0; cursor: pointer;
    }
    @media (min-width: 900px) { .nav-burger { display: none; } }
    .mobile-menu {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 70;
      display: flex; flex-direction: column; justify-content: flex-end;
      opacity: 0; pointer-events: none;
      transition: opacity 300ms var(--ease-sheet);
    }
    .mobile-menu.open { opacity: 1; pointer-events: auto; }
    .mobile-menu-sheet {
      background: var(--bg-card);
      border-radius: var(--radius-xl) var(--radius-xl) 0 0;
      padding: 32px 24px 40px;
      transform: translateY(100%);
      transition: transform 380ms var(--ease-sheet);
      box-shadow: var(--shadow-elevated);
    }
    .mobile-menu.open .mobile-menu-sheet { transform: translateY(0); }
    .mobile-menu-sheet a {
      display: block;
      font-family: var(--font-display-serif);
      font-size: 30px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border-subtle);
      color: var(--fg-primary);
    }
    .mobile-menu-sheet a:last-of-type { border-bottom: 0; }

    /* btn */
    .btn {
      position: relative; display: inline-flex; align-items: center; gap: 10px;
      padding: 6px 8px 6px 20px;
      border-radius: var(--radius-pill);
      background: var(--cta-primary); color: white; border: 0; cursor: pointer;
      font: inherit; font-size: 14px; font-weight: 500; text-decoration: none;
      transition: background var(--duration-med) var(--ease-clasico);
    }
    .btn .roll { display: flex; flex-direction: column; overflow: hidden; height: 20px; transition: transform var(--duration-long) var(--ease-clasico); }
    .btn .roll span { line-height: 20px; display: block; }
    .btn:hover .roll { transform: translateY(-50%); }
    .btn .circ {
      width: 30px; height: 30px; border-radius: 999px; background: white;
      display: inline-flex; align-items: center; justify-content: center;
      color: var(--cta-primary);
      transition: transform var(--duration-long) var(--ease-clasico);
    }
    .btn:hover .circ { transform: rotate(-45deg); }
    .btn:hover { background: var(--cta-primary-hover); }
    .btn.dark { background: var(--cta-secondary); }
    .btn.dark:hover { background: #000; }
    .btn.dark .circ { color: var(--fg-primary); }
    .btn.ghost { background: transparent; color: var(--fg-primary); border: 1px solid var(--border-subtle); padding: 6px 8px 6px 20px; }
    .btn.ghost .circ { background: var(--bg-inverse); color: white; }
    .btn.ghost:hover { background: var(--paper-0); }

    /* sections */
    section { position: relative; }
    .section-pad { padding-top: clamp(64px, 9vw, 140px); padding-bottom: clamp(64px, 9vw, 140px); }
    .section-pad-sm { padding-top: clamp(48px, 6vw, 90px); padding-bottom: clamp(48px, 6vw, 90px); }
    .bg-paper-100 { background: var(--paper-100); }
    .bg-paper-50 { background: var(--paper-50); }
    .bg-paper-0 { background: var(--paper-0); }
    .bg-ink { background: var(--ink-900); color: var(--fg-inverse); }

    .section-dark { background: var(--ink-900); color: var(--fg-inverse); }
    .section-dark .display-md, .section-dark .display-lg, .section-dark .display-xl, .section-dark .display-sm,
    .section-dark h1, .section-dark h2, .section-dark h3, .section-dark h4 { color: white; }
    .section-dark .muted { color: rgba(255,255,255,0.55); }
    .section-dark .eyebrow { color: rgba(255,255,255,0.7); }
    .section-dark .eyebrow-num { background: white; color: var(--ink-900); }
    .section-dark .eyebrow-label { background: transparent; border-color: rgba(255,255,255,0.22); color: rgba(255,255,255,0.9); }
    .section-dark em { color: var(--accent-orange); }

    /* hero */
    .hero { position: relative; min-height: 60vh; background: var(--ink-900); color: white; overflow: hidden; display: flex; flex-direction: column; }
    .hero .hero-rotator-line, .hero .hero-meta { color: rgba(255,255,255,0.92); }
    .hero .hero-meta .muted, .hero .hero-meta span[style*="opacity"] { color: rgba(255,255,255,0.6); }
    .hero-video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; pointer-events: none; }
    .hero-video-scrim { position: absolute; inset: 0; z-index: 1; background: linear-gradient(180deg, rgba(17,17,17,0.45) 0%, rgba(17,17,17,0.25) 45%, rgba(17,17,17,0.6) 100%); pointer-events: none; }
    .hero-logo { height: clamp(135px, 24vw, 345px); width: auto; display: block; margin: 0 auto 24px; }
    .hero-canvas { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
    .hero-grain { position: absolute; inset: 0; z-index: 2; background-image: radial-gradient(circle at 20% 30%, rgba(0,0,0,0.04), transparent 40%), radial-gradient(circle at 80% 70%, rgba(0,0,0,0.05), transparent 40%); mix-blend-mode: multiply; pointer-events: none; }
    .hero-body {
      position: relative; z-index: 5;
      margin-top: auto; margin-left: auto; margin-right: auto;
      padding-bottom: clamp(31px, 4vw, 75px);
      padding-top: 60px;
      display: flex; flex-direction: column; align-items: center; text-align: center;
    }
    .hero-wordmark { font-size: clamp(72px, 18vw, 280px); line-height: 0.84; letter-spacing: -0.05em; margin-bottom: 32px; display: flex; align-items: baseline; flex-wrap: nowrap; }
    .hero-wordmark .wm-bracket { font-size: 0.95em; }
    .hero-rotator-wrap { position: relative; height: clamp(32px, 4.5vw, 58px); overflow: hidden; width: max-content; max-width: 100%; margin: 0 auto; }
    .hero-rotator-sizer { visibility: hidden; display: block; white-space: nowrap; font-family: var(--font-display-serif); font-size: clamp(18px, 4.6vw, 42px); letter-spacing: -0.02em; font-style: italic; padding: 0 4px; }
    .hero-rotator-line {
      position: absolute; inset: 0;
      font-family: var(--font-display-serif); font-size: clamp(18px, 4.6vw, 42px);
      white-space: nowrap; line-height: 1.1; letter-spacing: -0.02em; font-style: italic;
      color: var(--fg-primary);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transform: translateY(100%);
      transition: opacity 600ms var(--ease-clasico), transform 600ms var(--ease-clasico);
    }
    .hero-rotator-line.active { opacity: 1; transform: translateY(0); }
    .hero-rotator-line.exit { opacity: 0; transform: translateY(-100%); }
    .hero-meta { margin-top: 36px; display: flex; flex-wrap: wrap; gap: 24px; align-items: center; justify-content: center; font-size: 13px; color: var(--fg-secondary); }
    .hero-meta .dot { width: 6px; height: 6px; border-radius: 999px; background: var(--accent-orange); display: inline-block; }

    /* split */
    .split-2 { display: grid; grid-template-columns: 1fr; gap: 32px; align-items: center; }
    @media (min-width: 1024px) { .split-2 { grid-template-columns: 1fr 1fr; gap: 64px; } }

    /* por-que */
    .porque .split-2 { gap: 48px; align-items: center; }
    @media (min-width: 1024px) { .porque .split-2 { grid-template-columns: 0.9fr 1.1fr; gap: 80px; } }
    .porque-graphic { position: relative; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: flex-start; }
    .pixel-heart { position: relative; display: grid; grid-template-columns: repeat(11, 1fr); grid-template-rows: repeat(10, 1fr); width: min(60%, 320px); aspect-ratio: 11/10; gap: 2px; margin-left: -8%; z-index: 2; }
    .pixel-heart .px { background: var(--accent-orange); border-radius: 2px; transition: transform 600ms var(--ease-clasico), background 400ms var(--ease-clasico); }
    .pixel-heart.beat .px { animation: beat 1.6s var(--ease-clasico) infinite; }
    @keyframes beat { 0%, 100% { transform: scale(1); } 10% { transform: scale(1.08); } 20% { transform: scale(1); } 30% { transform: scale(1.05); } 40% { transform: scale(1); } }
    .porque-brace { position: absolute; font-family: var(--font-display-sans); font-size: clamp(160px, 32vw, 480px); color: var(--accent-orange); top: 50%; right: -4%; transform: translateY(-50%); line-height: 0.9; opacity: 0.18; pointer-events: none; user-select: none; }
    .porque-headline { font-family: var(--font-display-serif); font-size: clamp(2rem, 4.4vw, 4rem); line-height: 1.1; letter-spacing: -0.02em; font-weight: 400; }
    .porque-headline em { color: var(--accent-orange); font-style: italic; }
    .porque-meta { margin-top: 36px; display: flex; gap: 24px; flex-wrap: wrap; font-size: 13px; color: rgba(0,0,0,0.55); }
    .section-dark .porque-meta { color: rgba(255,255,255,0.55); }
    .section-dark .porque-brace { opacity: 0.18; }

    /* marquee */
    .marquee { position: relative; overflow: hidden; width: 100%; mask-image: linear-gradient(to right, transparent 0%, black 6%, black 94%, transparent 100%); -webkit-mask-image: linear-gradient(to right, transparent 0%, black 6%, black 94%, transparent 100%); }
    .marquee-track { display: inline-flex; align-items: center; gap: 80px; padding: 8px 0; animation: scroll-x 40s linear infinite; white-space: nowrap; }
    .marquee:hover .marquee-track { animation-play-state: paused; }
    .marquee-track.reverse { animation-direction: reverse; animation-duration: 50s; }
    @keyframes scroll-x { from { transform: translateX(0); } to { transform: translateX(-50%); } }
    .brand-logo { flex-shrink: 0; font-family: var(--font-display-serif); font-size: clamp(28px, 3.8vw, 56px); letter-spacing: -0.04em; color: var(--ink-900); opacity: 0.7; transition: opacity var(--duration-med) var(--ease-clasico); display: inline-flex; align-items: center; gap: 6px; }
    .brand-logo-img { height: clamp(36px, 4.5vw, 64px); padding: 0; opacity: 0.85; filter: grayscale(20%); }
    .brand-logo-img img { height: 100%; width: auto; display: block; object-fit: contain; }
    .brand-logo-img:hover { filter: grayscale(0%); opacity: 1; }
    .brand-logo .glyph { font-family: var(--font-display-sans); font-size: 0.8em; }
    .section-dark .brand-logo { color: white; }
    .brand-logo:hover { opacity: 1; color: var(--accent-orange); }
    .brand-chip { flex-shrink: 0; height: 96px; min-width: 200px; padding: 0 40px; display: inline-flex; align-items: center; justify-content: center; background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); transition: border-color var(--duration-med) var(--ease-clasico); }
    .brand-chip:hover { border-color: var(--border-strong); }
    .brand-chip img { width: auto; max-width: 200px; object-fit: contain; display: block; }
    .brand-chip-dark { background: var(--ink-900); border-color: var(--ink-900); }

    /* campaign */
    .campaign-header { display: flex; align-items: flex-end; justify-content: space-between; gap: 32px; flex-wrap: wrap; margin-bottom: 56px; }
    .campaign-grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
    @media (min-width: 700px) { .campaign-grid { grid-template-columns: repeat(2, 1fr); gap: 20px; } }
    @media (min-width: 1100px) { .campaign-grid { grid-template-columns: repeat(3, 1fr); gap: 24px; } }
    .campaign-card { position: relative; border-radius: var(--radius-lg); overflow: hidden; aspect-ratio: 4/5; cursor: pointer; background: var(--ink-900); transition: transform 600ms var(--ease-clasico); }
    .campaign-card.featured { aspect-ratio: 4/3; }
    @media (min-width: 1100px) { .campaign-card.featured { grid-column: span 2; aspect-ratio: 16/9; } }
    .campaign-thumb { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; transition: transform 1.2s var(--ease-clasico), opacity 400ms var(--ease-clasico); }
    .campaign-card:hover .campaign-thumb { transform: scale(1.05); }
    .campaign-iframe-wrap { position: absolute; inset: 0; opacity: 0; transition: opacity 400ms var(--ease-clasico); pointer-events: none; }
    .campaign-card.previewing .campaign-iframe-wrap { opacity: 1; }
    .campaign-iframe-wrap iframe { width: 100%; height: 100%; border: 0; }
    .campaign-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.15) 40%, rgba(0,0,0,0) 70%); display: flex; flex-direction: column; justify-content: flex-end; padding: 24px; color: white; pointer-events: none; }
    .campaign-meta-row { display: flex; gap: 10px; margin-bottom: 12px; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; }
    .campaign-meta-row span { background: rgba(255,255,255,0.18); backdrop-filter: blur(6px); padding: 4px 10px; border-radius: 999px; }
    .campaign-title { font-family: var(--font-display-serif); font-size: clamp(1.2rem, 1.8vw, 1.8rem); letter-spacing: -0.02em; line-height: 1.1; }
    .campaign-client { font-size: 13px; margin-top: 6px; opacity: 0.8; }

<body>
  <div id="root"></div>

  <script type="text/babel">
    // ─── tweaks-panel ────────────────────────────────────────────────────────

    const __TWEAKS_STYLE = `
      .twk-panel{position:fixed;right:16px;bottom:16px;z-index:2147483646;width:280px;
        max-height:calc(100vh - 32px);display:flex;flex-direction:column;
        transform:scale(var(--dc-inv-zoom,1));transform-origin:bottom right;
        background:rgba(250,249,247,.78);color:#29261b;

        border:.5px solid rgba(255,255,255,.6);border-radius:14px;
        box-shadow:0 1px 0 rgba(255,255,255,.5) inset,0 12px 40px rgba(0,0,0,.18);
        font:11.5px/1.4 ui-sans-serif,system-ui,-apple-system,sans-serif;overflow:hidden}
      .twk-hd{display:flex;align-items:center;justify-content:space-between;padding:10px 8px 10px 14px;cursor:move;user-select:none}
      .twk-hd b{font-size:12px;font-weight:600;letter-spacing:.01em}
      .twk-x{appearance:none;border:0;background:transparent;color:rgba(41,38,27,.55);width:22px;height:22px;border-radius:6px;cursor:default;font-size:13px;line-height:1}
      .twk-x:hover{background:rgba(0,0,0,.06);color:#29261b}
      .twk-body{padding:2px 14px 14px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;overflow-x:hidden;min-height:0;scrollbar-width:thin;scrollbar-color:rgba(0,0,0,.15) transparent}
      .twk-row{display:flex;flex-direction:column;gap:5px}
      .twk-row-h{flex-direction:row;align-items:center;justify-content:space-between;gap:10px}
      .twk-lbl{display:flex;justify-content:space-between;align-items:baseline;color:rgba(41,38,27,.72)}
      .twk-lbl>span:first-child{font-weight:500}
      .twk-val{color:rgba(41,38,27,.5);font-variant-numeric:tabular-nums}
      .twk-sect{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:rgba(41,38,27,.45);padding:10px 0 0}
      .twk-sect:first-child{padding-top:0}
      .twk-seg{position:relative;display:flex;padding:2px;border-radius:8px;background:rgba(0,0,0,.06);user-select:none}
      .twk-seg-thumb{position:absolute;top:2px;bottom:2px;border-radius:6px;background:rgba(255,255,255,.9);box-shadow:0 1px 2px rgba(0,0,0,.12);transition:left .15s cubic-bezier(.3,.7,.4,1),width .15s}
      .twk-seg button{appearance:none;position:relative;z-index:1;flex:1;border:0;background:transparent;color:inherit;font:inherit;font-weight:500;min-height:22px;border-radius:6px;cursor:default;padding:4px 6px;line-height:1.2}
      .twk-toggle{position:relative;width:32px;height:18px;border:0;border-radius:999px;background:rgba(0,0,0,.15);transition:background .15s;cursor:default;padding:0}
      .twk-toggle[data-on="1"]{background:#34c759}
      .twk-toggle i{position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.25);transition:transform .15s}
      .twk-toggle[data-on="1"] i{transform:translateX(14px)}
      .twk-chips{display:flex;gap:6px}
      .twk-chip{position:relative;appearance:none;flex:1;min-width:0;height:46px;padding:0;border:0;border-radius:6px;overflow:hidden;cursor:default;box-shadow:0 0 0 .5px rgba(0,0,0,.12),0 1px 2px rgba(0,0,0,.06);transition:transform .12s,box-shadow .12s}
      .twk-chip:hover{transform:translateY(-1px);box-shadow:0 0 0 .5px rgba(0,0,0,.18),0 4px 10px rgba(0,0,0,.12)}
      .twk-chip[data-on="1"]{box-shadow:0 0 0 1.5px rgba(0,0,0,.85),0 2px 6px rgba(0,0,0,.15)}
      .twk-chip svg{position:absolute;top:6px;left:6px;width:13px;height:13px;filter:drop-shadow(0 1px 1px rgba(0,0,0,.3))}
    `;

    function useTweaks(defaults) {
      const [values, setValues] = React.useState(defaults);
      const setTweak = React.useCallback((keyOrEdits, val) => {
        const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null ? keyOrEdits : { [keyOrEdits]: val };
        setValues((prev) => ({ ...prev, ...edits }));
        window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
        window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
      }, []);
      return [values, setTweak];
    }

    function TweaksPanel({ title = 'Tweaks', children }) {
      const [open, setOpen] = React.useState(false);
      const dragRef = React.useRef(null);
      const offsetRef = React.useRef({ x: 16, y: 16 });
      const PAD = 16;
      const clampToViewport = React.useCallback(() => {
        const panel = dragRef.current;
        if (!panel) return;
        const w = panel.offsetWidth, h = panel.offsetHeight;
        const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
        const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
        offsetRef.current = { x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)), y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)) };
        panel.style.right = offsetRef.current.x + 'px';
        panel.style.bottom = offsetRef.current.y + 'px';
      }, []);
      React.useEffect(() => {
        const onMsg = (e) => {
          const t = e?.data?.type;
          if (t === '__activate_edit_mode') setOpen(true);
          else if (t === '__deactivate_edit_mode') setOpen(false);
        };
        window.addEventListener('message', onMsg);
        window.parent.postMessage({ type: '__edit_mode_available' }, '*');
        return () => window.removeEventListener('message', onMsg);
      }, []);
      const dismiss = () => { setOpen(false); window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*'); };
      const onDragStart = (e) => {
        const panel = dragRef.current; if (!panel) return;
        const r = panel.getBoundingClientRect();
        const sx = e.clientX, sy = e.clientY;
        const startRight = window.innerWidth - r.right, startBottom = window.innerHeight - r.bottom;
        const move = (ev) => { offsetRef.current = { x: startRight - (ev.clientX - sx), y: startBottom - (ev.clientY - sy) }; clampToViewport(); };
        const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
        window.addEventListener('mousemove', move); window.addEventListener('mouseup', up);
      };
      if (!open) return null;
      return (
        <>
          <style>{__TWEAKS_STYLE}</style>
          <div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
            <div className="twk-hd" onMouseDown={onDragStart}>
              <b>{title}</b>
              <button className="twk-x" onMouseDown={(e) => e.stopPropagation()} onClick={dismiss}>✕</button>
            </div>
            <div className="twk-body">{children}</div>
          </div>
        </>
      );
    }

    function TweakSection({ label, children }) {
      return (<><div className="twk-sect">{label}</div>{children}</>);
    }

    function TweakRow({ label, value, children, inline = false }) {
      return (
        <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
          <div className="twk-lbl"><span>{label}</span>{value != null && <span className="twk-val">{value}</span>}</div>
          {children}
        </div>
      );
    }

    function TweakRadio({ label, value, options, onChange }) {
      const trackRef = React.useRef(null);
      const [dragging, setDragging] = React.useState(false);
      const valueRef = React.useRef(value);
      valueRef.current = value;
      const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
      const idx = Math.max(0, opts.findIndex((o) => o.value === value));
      const n = opts.length;
      const segAt = (clientX) => {
        const r = trackRef.current.getBoundingClientRect();
        const i = Math.floor(((clientX - r.left - 2) / (r.width - 4)) * n);
        return opts[Math.max(0, Math.min(n - 1, i))].value;
      };
      const onPointerDown = (e) => {
        setDragging(true);
        const v0 = segAt(e.clientX);
        if (v0 !== valueRef.current) onChange(v0);
        const move = (ev) => { if (!trackRef.current) return; const v = segAt(ev.clientX); if (v !== valueRef.current) onChange(v); };
        const up = () => { setDragging(false); window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); };
        window.addEventListener('pointermove', move); window.addEventListener('pointerup', up);
      };
      return (
        <TweakRow label={label}>
          <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown} className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
            <div className="twk-seg-thumb" style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`, width: `calc((100% - 4px) / ${n})` }} />
            {opts.map((o) => (<button key={o.value} type="button" role="radio" aria-checked={o.value === value}>{o.label}</button>))}
          </div>
        </TweakRow>
      );
    }

    function __twkIsLight(hex) {
      const h = String(hex).replace('#', '');
      const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
      const n = parseInt(x.slice(0, 6), 16);
      if (Number.isNaN(n)) return true;
      const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
      return r * 299 + g * 587 + b * 114 > 148000;
    }

    function TweakColor({ label, value, options, onChange }) {
      if (!options || !options.length) {
        return (<div className="twk-row twk-row-h"><div className="twk-lbl"><span>{label}</span></div><input type="color" value={value} onChange={(e) => onChange(e.target.value)} /></div>);
      }
      const key = (o) => String(JSON.stringify(o)).toLowerCase();
      const cur = key(value);
      return (
        <TweakRow label={label}>
          <div className="twk-chips" role="radiogroup">
            {options.map((o, i) => {
              const colors = Array.isArray(o) ? o : [o];
              const [hero] = colors;
              const on = key(o) === cur;
              return (
                <button key={i} type="button" className="twk-chip" role="radio" aria-checked={on} data-on={on ? '1' : '0'}
                        title={colors.join(' · ')} style={{ background: hero }} onClick={() => onChange(o)}>
                  {on && <svg viewBox="0 0 14 14" aria-hidden="true"><path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" stroke={__twkIsLight(hero) ? 'rgba(0,0,0,.78)' : '#fff'} /></svg>}
                </button>
              );
            })}
          </div>
        </TweakRow>

    const __oembedCache = {};
    function useOembed(id) {
      const [meta, setMeta] = useStateCmp(__oembedCache[id] || null);
      useEffectCmp(() => {
        if (__oembedCache[id]) { setMeta(__oembedCache[id]); return; }
        let alive = true;
        fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${id}&format=json`)
          .then((r) => r.ok ? r.json() : null)
          .then((d) => {
            if (!d) return;
            const m = { title: d.title, author: d.author_name };
            __oembedCache[id] = m;
            if (alive) setMeta(m);
          }).catch(() => {});
        return () => { alive = false; };
      }, [id]);
      return meta;
    }

                <Wordmark size={64} dark />
                <p style={{ marginTop: 16, fontSize: 13, color: 'rgba(255,255,255,0.6)', maxWidth: 320 }}></p>
              </div>
              <div className="foot-mid" style={{ display: 'flex', justifyContent: 'center' }}>
                <TextRollButton label="contacto@esunclasico.com" href="mailto:contacto@esunclasico.com" />
              </div>
              <div className="foot-right">
                <a className="foot-social" href="#" aria-label="LinkedIn"><LinkedinIcon size={18} /></a>
                <a className="foot-social" href="#" aria-label="Instagram"><InstagramIcon size={18} /></a>
                <a className="foot-social" href="mailto:contacto@esunclasico.com" aria-label="Email"><MailIcon size={18} /></a>
              </div>
            </div>
            <div className="foot-bottom">
              <span>Clasico. 2026</span>
              <span>Desarrollado por <a href="#" style={{ color: 'white' }}>Bixel</a> &amp; <a href="#" style={{ color: 'white' }}>Claude</a></span>
            </div>
          </div>
        </footer>
      );
    }
    window.Footer = Footer;

    // ─── app ─────────────────────────────────────────────────────────────────

    const { useEffect: useEffectA } = React;

    const TWEAK_DEFAULTS = { accent: '#F26522', heroBg: 'flat' };
    const ACCENT_MAP = { '#F26522': 'orange', '#FF5F03': 'redorange', '#2EE000': 'green', '#8B82E3': 'lavender', '#CDE600': 'acid' };

    function App() {
      const [t, setTweak] = window.useTweaks(TWEAK_DEFAULTS);
      useEffectA(() => {
        const cls = document.documentElement.classList;
        Object.values(ACCENT_MAP).forEach((c) => cls.remove('accent-' + c));
        const name = ACCENT_MAP[t.accent] || 'orange';
        if (name !== 'orange') cls.add('accent-' + name);
      }, [t.accent]);
      return (
        <>
          <Navbar />
          <main>
            <Hero bgVariant={t.heroBg} />
            <PorQue />
            <Campaign />
            <Experiencia />
            <Alianzas />
            <Somos />
          </main>
          <Footer />
          <window.TweaksPanel title="Tweaks">
            <window.TweakSection label="Color de acento">
              <window.TweakColor label="Acento" value={t.accent}
                options={['#F26522', '#FF5F03', '#2EE000', '#8B82E3', '#CDE600']}
                onChange={(v) => setTweak('accent', v)} />
            </window.TweakSection>
            <window.TweakSection label="Hero">
              <window.TweakRadio label="Fondo" value={t.heroBg}
                options={[{ value: 'flat', label: 'Plano' }, { value: 'blobs', label: 'Blobs' }, { value: 'dots', label: 'Puntos' }]}
                onChange={(v) => setTweak('heroBg', v)} />
            </window.TweakSection>
          </window.TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
